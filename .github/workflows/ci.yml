name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backoffice Next.js ────────────────────────────────────────────────────
  backoffice:
    name: Backoffice — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backoffice

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backoffice/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN || '' }}

  # ── Supabase Edge Functions (Deno) ────────────────────────────────────────
  edge-functions:
    name: Edge Functions — type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type-check recipes
        run: deno check supabase/functions/recipes/index.ts

      - name: Type-check meal-plan
        run: deno check supabase/functions/meal-plan/index.ts

      - name: Type-check shopping
        run: deno check supabase/functions/shopping/index.ts

  # ── Migrations SQL — vérification d'ordre et de syntaxe ──────────────────
  migrations:
    name: Migrations — order check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check migration file naming
        run: |
          files=$(ls supabase/migrations/*.sql 2>/dev/null | sort)
          echo "Migrations trouvées :"
          echo "$files"
          prev=""
          for f in $files; do
            ts=$(basename "$f" | grep -oE '^[0-9]+')
            if [ -n "$prev" ] && [ "$ts" -le "$prev" ]; then
              echo "ERREUR: Timestamp dupliqué ou hors ordre: $f"
              exit 1
            fi
            prev=$ts
          done
          echo "Ordre des migrations OK"

  # ── iOS — SwiftLint ───────────────────────────────────────────────────────
  ios-lint:
    name: iOS — SwiftLint
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: iOS/SOPK
        run: swiftlint lint --reporter github-actions-logging || true
